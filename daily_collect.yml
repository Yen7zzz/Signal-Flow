# ============================================================
# .github/workflows/daily_collect.yml
# 每天早上 08:00（台灣時間）自動抓新聞存進 DB
# ============================================================

name: 📥 每日新聞收集

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 台灣時間 08:00
  workflow_dispatch:        # 允許手動觸發（測試用）

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      # Step 1：把 repo 拉下來（包含最新的 news.db）
      - name: 拉取程式碼和資料庫
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2：安裝 Python
      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Step 3：安裝套件
      - name: 安裝套件
        run: pip install feedparser transformers torch sentence-transformers

      # Step 4：建立設定檔（從 GitHub Secrets 讀取）
      - name: 建立 config.py
        run: |
          cat > config.py << EOF
          AI_PROVIDER = "groq"
          GROQ_API_KEY = "${{ secrets.GROQ_API_KEY }}"
          GROQ_MODEL = "llama-3.3-70b-versatile"
          OPENAI_API_KEY = ""
          OPENAI_MODEL = "gpt-4o-mini"
          EMAIL_SENDER = "${{ secrets.EMAIL_SENDER }}"
          EMAIL_PASSWORD = "${{ secrets.EMAIL_PASSWORD }}"
          EMAIL_RECEIVER = "${{ secrets.EMAIL_RECEIVER }}"
          SMTP_HOST = "smtp.gmail.com"
          SMTP_PORT = 587
          DB_PATH = "data/news.db"
          TOP_N = 5
          RSS_FEEDS = {
              "財經": [
                  "https://feeds.bloomberg.com/markets/news.rss",
                  "https://www.cnbc.com/id/10001147/device/rss/rss.html",
                  "https://tw.stock.yahoo.com/rss",
              ],
              "科技": [
                  "https://feeds.feedburner.com/TechCrunch",
                  "https://www.theverge.com/rss/index.xml",
                  "https://hnrss.org/frontpage",
                  "https://www.engadget.com/rss.xml",
                  "https://feeds.arstechnica.com/arstechnica/index",
                  "https://www.wired.com/feed/rss",
                  "https://www.technologyreview.com/topnews.rss",
              ],
              "政治": [
                  "https://feeds.bbci.co.uk/news/world/rss.xml",
                  "https://rss.nytimes.com/services/xml/rss/nyt/World.xml",
              ],
          }
          EOF

      # Step 5：建立資料夾
      - name: 建立必要資料夾
        run: mkdir -p data logs

      # Step 6：執行 Pipeline A
      - name: 執行每日新聞收集
        run: python pipeline_a_transformer.py

      # Step 7：把更新後的 DB 推回 GitHub
      - name: 儲存資料庫回 GitHub
        run: |
          git config user.name "SignalFlow Bot"
          git config user.email "action@github.com"
          git add data/news.db logs/
          git diff --staged --quiet || git commit -m "🗞️ 每日新聞更新 $(date '+%Y-%m-%d')"
          git push
